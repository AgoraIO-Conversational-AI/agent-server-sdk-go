name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub Release
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up go
        uses: actions/setup-go@v5

      - name: Build
        run: go build ./...

      - name: Setup wiremock server
        run: |
          if [ -f wiremock/docker-compose.test.yml ]; then
            docker compose -f wiremock/docker-compose.test.yml down
            docker compose -f wiremock/docker-compose.test.yml up -d

            for i in {1..30}; do
              if curl -fsS "http://localhost:8080/__admin/mappings" >/dev/null; then
                echo "Wiremock is ready"
                exit 0
              fi
              sleep 1
            done

            echo "Wiremock did not become ready in time"
            docker compose -f wiremock/docker-compose.test.yml logs
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Teardown wiremock server
        if: always()
        run: |
          if [ -f wiremock/docker-compose.test.yml ]; then docker compose -f wiremock/docker-compose.test.yml down; fi

      - name: Extract changelog notes
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME}"
          NOTES=$(awk -v ver="## [${VERSION}]" '
            index($0, ver) == 1 { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          echo "$NOTES" > release_notes.md
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release_notes.md
